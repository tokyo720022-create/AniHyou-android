name: Build Custom APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Build FOSS Debug APK
        run: ./gradlew :app:assembleFossDebug

      - name: Find APK
        run: find app/build/outputs/apk -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Custom-AniHyou-FOSS-APK
          path: app/build/outputs/apk/foss/debug/*.apk
